
name: Pokemon Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      WEBHOOK: ${{ secrets.WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Run monitor
        timeout-minutes: 10
        run: |
          timeout 9m python monitor.py
